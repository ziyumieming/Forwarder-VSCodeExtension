name: Build VSIX

on:
  push:
    tags:
      - 'v*'
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm dlx @vscode/vsce package --no-dependencies


      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: "*.vsix"
          retention-days: 7

      - name: Prepare release notes from changelog (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          notes_file="release-notes.md"
          if [[ -f CHANGELOG.md ]]; then
            awk -v ver="$version" '
              BEGIN { capture = 0 }
              $0 ~ "^##[[:space:]]*\\[?" ver "\\]?" { capture = 1; next }
              $0 ~ "^##[[:space:]]+" { if (capture) exit }
              capture { print }
            ' CHANGELOG.md > "$notes_file"
          fi
          if [[ ! -s "$notes_file" ]]; then
            echo "Release $tag" > "$notes_file"
            echo "" >> "$notes_file"
            echo "See CHANGELOG.md for details." >> "$notes_file"
          fi

      - name: Upload VSIX to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          
      - name: Publish extension (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: pnpm dlx @vscode/vsce publish --no-dependencies --pat $VSCE_PAT
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
