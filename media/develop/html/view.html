<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src {{cspSource}} data:; style-src {{cspSource}}; script-src 'nonce-{{nonce}}';" />
    <link rel="stylesheet" href="{{styleUri}}" />
    <title>Forwarder Analysis</title>
</head>

<body>
    <div class="background-glow" aria-hidden="true"></div>

    <nav class="top-nav">
        <div class="left">
            <span class="brand-dot"></span>
            <span class="brand">Forwarder Analysis</span>
        </div>
        <div class="query-options relation-options" aria-label="Relation Options">
            <span class="option-title">Relations</span>
            <label class="option-item" for="rel-extends">
                <input id="rel-extends" type="checkbox" checked />
                <span>Extends</span>
            </label>
            <label class="option-item" for="rel-implements">
                <input id="rel-implements" type="checkbox" checked />
                <span>Implements</span>
            </label>
        </div>
        <div class="query-options scope-options" aria-label="Workspace Scope Options">
            <span class="option-title">Scope</span>
            <label class="option-item" for="include-external">
                <input id="include-external" type="checkbox" />
                <span>Include External Files</span>
            </label>
        </div>
        <div class="center controls">
            <button id="btn-fit" class="nav-btn">Fit</button>
            <button id="btn-layout" class="nav-btn">Layout</button>
            <button id="btn-reset" class="nav-btn">Reset</button>
        </div>
        <div class="right controls">
            <button id="btn-query" class="nav-btn nav-btn-primary">Query</button>
        </div>
    </nav>

    <main class="canvas-wrap">
        <div id="cy" aria-label="Cytoscape Canvas"></div>
    </main>

    <script nonce="{{nonce}}" src="{{cytoscapeUri}}"></script>
    <script nonce="{{nonce}}" src="{{cytoscapeHtmlNodeUri}}"></script>
    <script nonce="{{nonce}}" src="{{styleScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{eventScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{uiScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleLoggerScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{modulePluginManagerScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleCardMarkupScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleCenterStateScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleQueryServiceScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleGraphIncrementalScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleGraphPipelineScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleLayoutManagerScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleCardRenderScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleCardEventsScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleViewportAnimationScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleGraphFocusScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{moduleCenterPresentationScriptUri}}"></script>
    <script nonce="{{nonce}}" src="{{mainScriptUri}}"></script>
</body>

</html>
